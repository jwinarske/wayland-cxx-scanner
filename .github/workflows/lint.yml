name: Lint

on:
  push:
    branches:
      - main
      - master
      - "copilot/**"
  pull_request:
    branches:
      - main
      - master

jobs:
  clang-format:
    name: clang-format-19
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-19
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format-19

      - name: Check C++ formatting
        run: |
          find include src tests examples \
            \( -name '*.cpp' -o -name '*.hpp' \) \
            -print0 \
          | xargs -0 -r clang-format-19 --dry-run -Werror

  clang-tidy:
    name: clang-tidy-19
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            meson ninja-build \
            clang-19 clang-tidy-19 \
            libwayland-dev \
            libexpat1-dev

      - name: Configure (generate compile_commands.json)
        env:
          CC: clang-19
          CXX: clang++-19
        run: |
          meson setup builddir \
            -Dtests=true \
            -Dexamples=false \
            --wrap-mode=forcefallback

      - name: Run clang-tidy-19
        run: |
          find src include \
            -name '*.cpp' \
            -print0 \
          | xargs -0 -r \
            clang-tidy-19 \
              -p builddir \
              --warnings-as-errors='*'
